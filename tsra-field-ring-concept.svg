<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">TSRA field-ring logo concept</title>
  <desc id="desc">A transparent three-dimensional seismic field-ring with a quiet waveform trace and TSRA wordmark guide.</desc>
  <defs>
    <filter id="ink-depth" x="-18%" y="-18%" width="136%" height="136%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset in="blur" dx="18" dy="22" result="offset"/>
      <feColorMatrix in="offset" type="matrix" values="0 0 0 0 0.03 0 0 0 0 0.025 0 0 0 0 0.018 0 0 0 .46 0" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="line-depth" x="-18%" y="-18%" width="136%" height="136%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blur"/>
      <feOffset in="blur" dx="9" dy="11" result="offset"/>
      <feColorMatrix in="offset" type="matrix" values="0 0 0 0 0.03 0 0 0 0 0.025 0 0 0 0 0.018 0 0 0 .36 0" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ring-ink" x1="254" y1="168" x2="972" y2="1020" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff4df" stop-opacity="0.98"/>
      <stop offset="0.34" stop-color="#d4b06a" stop-opacity="0.92"/>
      <stop offset="0.68" stop-color="#b89455" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7f9878" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="ring-shadow" x1="280" y1="280" x2="960" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b3020" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#172015" stop-opacity="0.64"/>
    </linearGradient>
    <linearGradient id="trace-ink" x1="245" y1="690" x2="960" y2="590" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7f9878" stop-opacity="0.58"/>
      <stop offset="0.44" stop-color="#fff4df" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#b89455" stop-opacity="0.78"/>
    </linearGradient>
  </defs>

  <g opacity="0.18">
    <path d="M232 600H968" stroke="#e2d6be" stroke-opacity="0.16" stroke-width="1"/>
    <path d="M600 232V968" stroke="#e2d6be" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="600" cy="600" r="352" fill="none" stroke="#e2d6be" stroke-opacity="0.08" stroke-width="1"/>
  </g>

  <g filter="url(#ink-depth)">
    <path d="M 830 256 C 943 332, 1000 454, 981 588 C 961 748, 853 884, 712 941 C 570 998, 406 967, 302 854 C 194 737, 177 562, 252 420 C 325 284, 468 202, 616 196 C 709 192, 778 218, 830 256" fill="none" stroke="url(#ring-shadow)" stroke-width="54" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.54"/>
    <path d="M 824 250 C 938 326, 993 452, 974 586 C 954 742, 850 878, 710 936 C 568 994, 410 963, 306 850 C 199 735, 184 566, 258 424 C 329 289, 470 207, 615 201 C 705 198, 772 216, 824 250" fill="none" stroke="url(#ring-ink)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.97"/>
    <path d="M 806 252 C 866 289, 915 348, 943 420" fill="none" stroke="#fff4df" stroke-width="8" stroke-linecap="round" stroke-opacity="0.38"/>
    <path d="M 308 800 C 374 900, 496 951, 618 942" fill="none" stroke="#0d0c0a" stroke-width="13" stroke-linecap="round" stroke-opacity="0.42"/>
  </g>

  <g filter="url(#line-depth)">
    <path d="M 286 662 C 340 651, 390 650, 430 656 C 466 661, 480 674, 504 671 C 536 667, 553 626, 580 625 C 611 624, 623 695, 653 692 C 682 689, 693 596, 724 593 C 754 590, 778 655, 814 656 C 850 657, 876 626, 912 622 C 940 619, 966 626, 988 620" fill="none" stroke="#271f14" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.44"/>
    <path d="M 286 654 C 340 645, 390 645, 430 650 C 466 655, 480 668, 504 666 C 536 663, 553 621, 580 620 C 611 619, 623 690, 653 687 C 682 684, 693 591, 724 588 C 754 585, 778 650, 814 651 C 850 652, 876 621, 912 617 C 940 614, 966 621, 988 615" fill="none" stroke="url(#trace-ink)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 292 681 C 376 670, 444 677, 508 684 C 576 691, 617 685, 662 676 C 728 663, 790 680, 852 673 C 906 667, 952 657, 986 659" fill="none" stroke="#e2d6be" stroke-opacity="0.16" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g opacity="0.78">
    <path d="M600 196v50" stroke="#d4b06a" stroke-opacity="0.68" stroke-width="5" stroke-linecap="round"/>
    <path d="M600 944v42" stroke="#7f9878" stroke-opacity="0.56" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(600 1082)" text-anchor="middle">
    <text font-family="IBM Plex Mono, JetBrains Mono, ui-monospace, monospace" font-size="32" letter-spacing="8" fill="#eee6d6" fill-opacity="0.78">TSRA</text>
    <text y="42" font-family="IBM Plex Mono, JetBrains Mono, ui-monospace, monospace" font-size="12" letter-spacing="5" fill="#eee6d6" fill-opacity="0.36">FIELD OBSERVATION</text>
  </g>
</svg>
