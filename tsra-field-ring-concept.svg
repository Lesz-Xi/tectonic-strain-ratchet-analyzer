<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">TSRA field-ring logo concept</title>
  <desc id="desc">A restrained imperfect seismic field-ring with a quiet waveform trace, designed for the Kuro Field dark doctrine.</desc>
  <defs>
    <filter id="paper-grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" seed="18" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.93 0 0 0 0 0.90 0 0 0 0 0.82 0 0 0 .055 0" result="grain"/>
      <feBlend in="SourceGraphic" in2="grain" mode="screen"/>
    </filter>
    <filter id="ink-softness" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.14"/>
    </filter>
    <linearGradient id="ring-ink" x1="250" y1="190" x2="960" y2="1010" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eee6d6" stop-opacity="0.94"/>
      <stop offset="0.48" stop-color="#b89455" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#7f9878" stop-opacity="0.74"/>
    </linearGradient>
    <linearGradient id="trace-ink" x1="260" y1="690" x2="930" y2="594" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7f9878" stop-opacity="0.34"/>
      <stop offset="0.42" stop-color="#eee6d6" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#b89455" stop-opacity="0.62"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="#0d0c0a"/>
  <rect width="1200" height="1200" fill="#15130f" opacity="0.44" filter="url(#paper-grain)"/>

  <!-- quiet measuring field -->
  <g opacity="0.28">
    <path d="M240 600H960" stroke="#e2d6be" stroke-opacity="0.12" stroke-width="1"/>
    <path d="M600 240V960" stroke="#e2d6be" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="600" cy="600" r="342" fill="none" stroke="#e2d6be" stroke-opacity="0.055" stroke-width="1"/>
  </g>

  <!-- imperfect seismic enso / field ring -->
  <g filter="url(#ink-softness)">
    <path d="
      M 824 278
      C 922 344, 973 459, 958 584
      C 941 726, 846 854, 711 909
      C 576 964, 425 936, 328 833
      C 227 725, 210 566, 280 435
      C 346 312, 474 236, 610 229
      C 697 225, 767 240, 824 278"
      fill="none"
      stroke="url(#ring-ink)"
      stroke-width="26"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-opacity="0.86"/>

    <path d="
      M 826 280
      C 880 316, 919 369, 942 430"
      fill="none"
      stroke="#eee6d6"
      stroke-width="6"
      stroke-linecap="round"
      stroke-opacity="0.26"/>

    <path d="
      M 302 794
      C 364 884, 489 936, 614 928"
      fill="none"
      stroke="#0d0c0a"
      stroke-width="8"
      stroke-linecap="round"
      stroke-opacity="0.28"/>
  </g>

  <!-- seismic trace: observation, not alarm -->
  <path d="
    M 312 658
    C 356 650, 392 650, 424 654
    C 456 658, 471 671, 492 670
    C 520 669, 540 632, 563 631
    C 590 630, 604 695, 631 693
    C 656 691, 669 604, 696 600
    C 724 596, 747 654, 777 656
    C 809 658, 833 631, 864 628
    C 895 625, 920 636, 944 631"
    fill="none"
    stroke="url(#trace-ink)"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- hairline aftertrace -->
  <path d="
    M 314 681
    C 380 674, 438 677, 493 684
    C 552 691, 589 686, 633 677
    C 693 664, 751 682, 812 675
    C 861 670, 908 660, 942 662"
    fill="none"
    stroke="#e2d6be"
    stroke-opacity="0.12"
    stroke-width="1.6"
    stroke-linecap="round"/>

  <!-- small field-index mark -->
  <g opacity="0.7">
    <path d="M600 226v38" stroke="#b89455" stroke-opacity="0.58" stroke-width="3" stroke-linecap="round"/>
    <path d="M600 936v30" stroke="#7f9878" stroke-opacity="0.46" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- optional tiny wordmark guide, removable for favicon -->
  <g transform="translate(600 1064)" text-anchor="middle">
    <text font-family="IBM Plex Mono, JetBrains Mono, ui-monospace, monospace" font-size="32" letter-spacing="8" fill="#eee6d6" fill-opacity="0.78">TSRA</text>
    <text y="42" font-family="IBM Plex Mono, JetBrains Mono, ui-monospace, monospace" font-size="12" letter-spacing="5" fill="#eee6d6" fill-opacity="0.36">FIELD OBSERVATION</text>
  </g>
</svg>
