<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">TSRA field-ring icon</title>
  <desc id="desc">An imperfect seismic field-ring with a quiet waveform trace, designed as the TSRA browser and web app icon.</desc>
  <defs>
    <filter id="paper-grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" seed="18" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.93 0 0 0 0 0.90 0 0 0 0 0.82 0 0 0 .052 0" result="grain"/>
      <feBlend in="SourceGraphic" in2="grain" mode="screen"/>
    </filter>
    <filter id="ink-softness" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.14"/>
    </filter>
    <linearGradient id="ring-ink" x1="250" y1="180" x2="960" y2="1020" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eee6d6" stop-opacity="0.96"/>
      <stop offset="0.48" stop-color="#b89455" stop-opacity="0.84"/>
      <stop offset="1" stop-color="#7f9878" stop-opacity="0.76"/>
    </linearGradient>
    <linearGradient id="trace-ink" x1="260" y1="690" x2="930" y2="594" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7f9878" stop-opacity="0.34"/>
      <stop offset="0.42" stop-color="#eee6d6" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#b89455" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="#0d0c0a"/>
  <rect width="1200" height="1200" fill="#15130f" opacity="0.44" filter="url(#paper-grain)"/>

  <g opacity="0.24">
    <path d="M232 600H968" stroke="#e2d6be" stroke-opacity="0.105" stroke-width="1"/>
    <path d="M600 232V968" stroke="#e2d6be" stroke-opacity="0.075" stroke-width="1"/>
    <circle cx="600" cy="600" r="352" fill="none" stroke="#e2d6be" stroke-opacity="0.052" stroke-width="1"/>
  </g>

  <g filter="url(#ink-softness)">
    <path d="
      M 824 278
      C 922 344, 973 459, 958 584
      C 941 726, 846 854, 711 909
      C 576 964, 425 936, 328 833
      C 227 725, 210 566, 280 435
      C 346 312, 474 236, 610 229
      C 697 225, 767 240, 824 278"
      fill="none"
      stroke="url(#ring-ink)"
      stroke-width="28"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-opacity="0.9"/>

    <path d="
      M 826 280
      C 880 316, 919 369, 942 430"
      fill="none"
      stroke="#eee6d6"
      stroke-width="6"
      stroke-linecap="round"
      stroke-opacity="0.25"/>

    <path d="
      M 302 794
      C 364 884, 489 936, 614 928"
      fill="none"
      stroke="#0d0c0a"
      stroke-width="8"
      stroke-linecap="round"
      stroke-opacity="0.28"/>
  </g>

  <path d="
    M 312 658
    C 356 650, 392 650, 424 654
    C 456 658, 471 671, 492 670
    C 520 669, 540 632, 563 631
    C 590 630, 604 695, 631 693
    C 656 691, 669 604, 696 600
    C 724 596, 747 654, 777 656
    C 809 658, 833 631, 864 628
    C 895 625, 920 636, 944 631"
    fill="none"
    stroke="url(#trace-ink)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <path d="
    M 314 681
    C 380 674, 438 677, 493 684
    C 552 691, 589 686, 633 677
    C 693 664, 751 682, 812 675
    C 861 670, 908 660, 942 662"
    fill="none"
    stroke="#e2d6be"
    stroke-opacity="0.12"
    stroke-width="1.6"
    stroke-linecap="round"/>

  <g opacity="0.72">
    <path d="M600 226v38" stroke="#b89455" stroke-opacity="0.58" stroke-width="3" stroke-linecap="round"/>
    <path d="M600 936v30" stroke="#7f9878" stroke-opacity="0.46" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
